definitions:
  constants.TaskStatus:
    enum:
    - pending
    - in_progress
    - done
    type: string
    x-enum-varnames:
    - TaskStatusPending
    - TaskStatusInProgress
    - TaskStatusDone
  handler.CreateTaskRequest:
    properties:
      assignee:
        example: alice
        type: string
      title:
        example: Buy groceries
        type: string
    required:
    - title
    type: object
  handler.TaskResponse:
    properties:
      assignee:
        example: alice
        type: string
      created_at:
        example: "2025-07-20T12:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/constants.TaskStatus'
        example: pending
      title:
        example: Buy groceries
        type: string
      updated_at:
        example: "2025-07-20T12:00:00Z"
        type: string
    type: object
  handler.UpdateTaskRequest:
    properties:
      assignee:
        example: alice
        type: string
      status:
        example: done
        type: string
      title:
        example: Buy groceries
        type: string
    type: object
info:
  contact: {}
paths:
  /tasks:
    get:
      description: List tasks with optional filtering and pagination
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by assignee
        in: query
        name: assignee
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Create a new task with title and optional assignee
      parameters:
      - description: Task to create
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.TaskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new task
      tags:
      - tasks
  /tasks/{id}:
    delete:
      description: Delete a task by ID
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a task
      tags:
      - tasks
    get:
      description: Get a task by its ID
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TaskResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a task by ID
      tags:
      - tasks
    put:
      consumes:
      - application/json
      description: Update a task by ID
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TaskResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a task
      tags:
      - tasks
swagger: "2.0"
